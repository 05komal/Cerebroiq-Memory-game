<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CerebroIQ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#050d0d;color:#e4eeff;font-family:'Space Mono',monospace;display:flex;align-items:center;justify-content:center;position:relative}

/* animated grid bg */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 70% 50% at 20% 20%,rgba(168,85,247,.08) 0%,transparent 55%),
  radial-gradient(ellipse 60% 45% at 80% 70%,rgba(0,245,212,.07) 0%,transparent 55%),
  radial-gradient(ellipse 50% 40% at 50% 50%,rgba(99,102,241,.04) 0%,transparent 70%)}
.bg::after{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,245,212,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,212,.022) 1px,transparent 1px);
  background-size:38px 38px}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px)}

/* floating particles */
.particle{position:fixed;z-index:1;pointer-events:none;font-size:1rem;animation:particleFloat linear infinite;opacity:0}
@keyframes particleFloat{0%{opacity:0;transform:translateY(100vh) rotate(0deg) scale(.7)}15%{opacity:.55}80%{opacity:.42}100%{opacity:0;transform:translateY(-80px) rotate(360deg) scale(1.1)}}

/* card */
.card{position:relative;z-index:10;width:100%;max-width:420px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:24px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:3.2rem;letter-spacing:.28em;color:#00f5d4;text-shadow:0 0 32px rgba(0,245,212,.3),0 0 60px rgba(0,245,212,.1);text-align:center;line-height:1.3;display:block}
.logo em{color:#06b6d4;font-style:normal}
.tagline{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:#1a4848;text-align:center;margin-top:18px;display:block}

.glass{width:100%;background:rgba(255,255,255,.028);border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:30px;display:flex;flex-direction:column;gap:16px;backdrop-filter:blur(10px)}

.tabs{display:flex;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.tab{flex:1;padding:11px;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:none;color:rgba(255,255,255,.28);cursor:pointer;transition:all .25s}
.tab.on{background:linear-gradient(135deg,#00f5d4,#06b6d4);color:#000}

.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:#1a4848}
.field input{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:11px;padding:13px 16px;font-family:'Space Mono',monospace;font-size:.9rem;color:#e4eeff;outline:none;transition:all .3s}
.field input:focus{border-color:#00f5d4;box-shadow:0 0 0 3px rgba(0,245,212,.12)}
.field input::placeholder{color:rgba(255,255,255,.16)}

.msg{font-size:.68rem;text-align:center;min-height:16px;letter-spacing:.08em;transition:all .3s}
.msg.err{color:#ff6b6b}.msg.ok{color:#00f5d4}

.go-btn{width:100%;background:linear-gradient(135deg,#00f5d4,#06b6d4);color:#000;border:none;border-radius:12px;padding:15px;font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.14em;cursor:pointer;box-shadow:0 0 24px rgba(0,245,212,.25);transition:all .25s}
.go-btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 0 36px rgba(0,245,212,.35)}
.go-btn:active{transform:scale(.97)}

.note{font-size:.58rem;color:#1a4848;letter-spacing:.1em;text-align:center;line-height:1.6}
.note span{color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="scanlines"></div>
<div id="particles"></div>

<div class="card">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="logo">Cerebro<em>IQ</em></div>
    <div class="tagline">Word &amp; Memory Challenge Suite</div>
  </div>

  <div class="glass">
    <div class="tabs">
      <button class="tab on" id="tabL">Login</button>
      <button class="tab" id="tabR">Register</button>
    </div>
    <div class="field"><label>Username</label><input id="iUser" type="text" placeholder="Enter your username" autocomplete="off" maxlength="20"></div>
    <div class="field"><label>Password</label><input id="iPass" type="password" placeholder="Enter your password" maxlength="30"></div>
    <div class="msg" id="msg"></div>
    <button class="go-btn" id="goBtn">LOGIN</button>
  </div>

  <div class="note">Scores and progress are saved locally in your browser<br><span>No data leaves your device</span></div>
</div>

<script>
const PARTICLES=['⬡','○','◇','⬟','◈','✦','◉','·','⊕','⊗'];

function spawnParticles(){
  const c=document.getElementById('particles');
  setInterval(()=>{
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=PARTICLES[Math.floor(Math.random()*PARTICLES.length)];
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(8+Math.random()*14)+'s';
    p.style.animationDelay=(Math.random()*3)+'s';
    p.style.fontSize=(1.3+Math.random()*1.1)+'rem';
    p.style.color='rgba(0,245,212,0.45)';
    c.appendChild(p);
    setTimeout(()=>p.remove(),20000);
  },600);
}
spawnParticles();

// Auth helpers
const getU=()=>JSON.parse(localStorage.getItem('cerebro_u')||'{}');
const saveU=u=>localStorage.setItem('cerebro_u',JSON.stringify(u));
const hp=s=>{let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h.toString()};
const mkU=()=>({pass:'',score:0,bestStreak:0,games:0,catScores:{},joined:new Date().toLocaleDateString()});

// Session
if(sessionStorage.getItem('cerebro_session')){
  window.location.href='index.html';
}

let mode='login';
document.getElementById('tabL').onclick=()=>{mode='login';document.getElementById('tabL').className='tab on';document.getElementById('tabR').className='tab';document.getElementById('goBtn').textContent='LOGIN';document.getElementById('msg').textContent=''};
document.getElementById('tabR').onclick=()=>{mode='register';document.getElementById('tabR').className='tab on';document.getElementById('tabL').className='tab';document.getElementById('goBtn').textContent='CREATE ACCOUNT';document.getElementById('msg').textContent=''};
document.getElementById('goBtn').onclick=doAuth;
[document.getElementById('iUser'),document.getElementById('iPass')].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()}));

function doAuth(){
  const u=document.getElementById('iUser').value.trim().toLowerCase();
  const p=document.getElementById('iPass').value;
  const msg=document.getElementById('msg');
  if(!u||!p){setMsg('Please fill in both fields','err');return}
  if(u.length<3){setMsg('Username needs at least 3 characters','err');return}
  const users=getU();
  if(mode==='register'){
    if(users[u]){setMsg('Username already taken — try another','err');return}
    const nu=mkU();nu.pass=hp(p);users[u]=nu;saveU(users);
    sessionStorage.setItem('cerebro_session',u);
    setMsg('Account created! Redirecting…','ok');
    setTimeout(()=>window.location.href='index.html',700);
  } else {
    if(!users[u]){setMsg('User not found — register first','err');return}
    if(users[u].pass!==hp(p)){setMsg('Wrong password — try again','err');return}
    sessionStorage.setItem('cerebro_session',u);
    setMsg('Welcome back, '+u+'! Loading…','ok');
    setTimeout(()=>window.location.href='index.html',600);
  }
}
function setMsg(t,c){const el=document.getElementById('msg');el.textContent=t;el.className='msg '+(c||'')}
</script>
</body>
</html>
